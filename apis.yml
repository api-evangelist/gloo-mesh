aid: gloo-mesh
name: Gloo Mesh
description: >-
  Gloo Mesh is an enterprise service mesh management platform from Solo.io
  built on Istio, providing multi-cluster and multi-mesh traffic management,
  security policy enforcement, and observability across hybrid cloud
  environments. It simplifies service mesh operations with a unified control
  plane and policy management interface, exposing Kubernetes Custom Resource
  Definitions (CRDs) such as AccessPolicy, JwtPolicy, and RatelimitPolicy as
  the primary API surface.
type: Index
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
