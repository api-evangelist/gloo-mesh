        url: https://docs.solo.io/gloo-mesh-enterprise/latest/changelog/
  - aid: gloo-mesh:gloo-mesh-core
    name: Gloo Mesh Core
    description: >-
      Gloo Mesh Core extends a single Istio service mesh with insights,
      operational tooling, and lifecycle management for upstream Istio
      deployments. It surfaces Istio insights, telemetry, and a curated set
      of policies to simplify Day 2 operations across a Kubernetes cluster.
    humanURL: https://www.solo.io/products/gloo-mesh/
    baseURL: https://docs.solo.io/gloo-mesh-core/latest/
