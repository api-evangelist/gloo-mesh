apis:
  - aid: gloo-mesh:gloo-mesh-enterprise
    name: Gloo Mesh Enterprise
    description: >-
      Gloo Mesh Enterprise (also called Gloo Platform) is a service mesh
      management platform built on Istio that provides intra-mesh and
      multi-cluster routing, access policies, JWT authentication, rate
      limiting, mTLS, fault injection, observability, and more. The platform
      exposes 100+ Kubernetes Custom Resources as its API surface, deployed
      via Helm and managed with the meshctl CLI.
    humanURL: https://www.solo.io/products/gloo-mesh/
    baseURL: https://docs.solo.io/gloo-mesh-enterprise/latest/
    tags:
      - Istio
      - Kubernetes
      - Multi-Cluster
      - Service Mesh
